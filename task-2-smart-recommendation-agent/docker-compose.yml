services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    restart: always
    ports:
      - "5500:5500"
    environment:
      PORT: 5500
      DATABASE_URL: ${DATABASE_URL}
      DIRECT_URL: ${DIRECT_URL}
      PINECONE_API_KEY: ${PINECONE_API_KEY}
      PINECONE_INDEX_NAME: ${PINECONE_INDEX_NAME}
      VOYAGE_API_KEY: ${VOYAGE_API_KEY}
      AI_PROVIDER_API_KEY: ${AI_PROVIDER_API_KEY}
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:5500/health').then((res) => process.exit(res.ok ? 0 : 1)).catch(() => process.exit(1))"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 20s

  frontend:
    build:
      context: ./client
      dockerfile: Dockerfile
      args:
        VITE_API_URL: /api
    restart: always
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "3000:80"
